spring.application.name=product-pricing-listing

# ===============================
# H2 Database Configuration
# ===============================
spring.datasource.url=jdbc:h2:mem:testdb
#spring.datasource.url=jdbc:h2:file:./data/testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Enable H2 Console (accessible at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# JPA / Hibernate Configuration
# ===============================
# Use schema.sql and data.sql instead of Hibernate auto DDL
spring.jpa.hibernate.ddl-auto=none

# Show SQL queries in logs
spring.jpa.show-sql=true

# Format SQL output for readability
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# SQL Initialization
# ===============================
# Always run schema.sql and data.sql on startup
spring.sql.init.mode=always
spring.sql.init.platform=h2

# ===============================
# Server Configuration
# ===============================
server.port=8081

